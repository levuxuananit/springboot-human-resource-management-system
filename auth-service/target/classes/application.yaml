server:
  port: 8081

spring:
  application:
    name: auth-service

  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}

  data:
    web:
      pageable:
        default-page-size: 5
        max-page-size: 100

jwt:
  secret: ${JWT_SECRET}
  expiration: ${JWT_EXPIRATION}

